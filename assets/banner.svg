<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Fable Method — one loop, four modes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e3b341"/>
      <stop offset="1" stop-color="#d29922"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Loop motif -->
  <g transform="translate(930,160)" font-family="ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
    <circle r="105" fill="none" stroke="#30363d" stroke-width="1.5"/>
    <path d="M 0,-105 A 105,105 0 0 1 105,0" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 100,-14 L 105,0 L 91,-4 Z" fill="#e3b341"/>
    <g text-anchor="middle" font-size="15" font-weight="600">
      <g transform="translate(0,-105)"><circle r="34" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/><text y="5" fill="#e6edf3">Recall</text></g>
      <g transform="translate(105,0)"><circle r="34" fill="#161b22" stroke="#30363d" stroke-width="1.5"/><text y="5" fill="#e6edf3">Work</text></g>
      <g transform="translate(0,105)"><circle r="34" fill="#161b22" stroke="#30363d" stroke-width="1.5"/><text y="5" fill="#e6edf3">Verify</text></g>
      <g transform="translate(-105,0)"><circle r="34" fill="#161b22" stroke="#30363d" stroke-width="1.5"/><text y="5" fill="#e6edf3">Record</text></g>
    </g>
  </g>

  <!-- Title block -->
  <g font-family="ui-sans-serif,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
    <text x="80" y="128" font-size="64" font-weight="800" fill="#e6edf3" letter-spacing="-1">Fable Method</text>
    <rect x="82" y="148" width="120" height="5" rx="2.5" fill="url(#accent)"/>
    <text x="80" y="196" font-size="24" fill="#9198a1">One loop, four modes. Evidence over assertion.</text>
    <g font-size="16" font-weight="600" text-anchor="middle">
      <rect x="80" y="228" width="92" height="34" rx="17" fill="#1f2637" stroke="#e3b341" stroke-width="1"/>
      <text x="126" y="250" fill="#e3b341">SOLVE</text>
      <rect x="184" y="228" width="92" height="34" rx="17" fill="#1f2637" stroke="#58a6ff" stroke-width="1"/>
      <text x="230" y="250" fill="#58a6ff">BUILD</text>
      <rect x="288" y="228" width="92" height="34" rx="17" fill="#1f2637" stroke="#3fb950" stroke-width="1"/>
      <text x="334" y="250" fill="#3fb950">GUIDE</text>
      <rect x="392" y="228" width="100" height="34" rx="17" fill="#1f2637" stroke="#bc8cff" stroke-width="1"/>
      <text x="442" y="250" fill="#bc8cff">ANSWER</text>
    </g>
  </g>
</svg>
